kind = "web"
previewPath = "/"
title = "Fast Food Favorites Survey"
version = "1.0.0"
id = "artifacts/fast-food-survey"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18895

[services.development]
run = "pnpm --filter @workspace/fast-food-survey run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fast-food-survey", "run", "build" ]
publicDir = "artifacts/fast-food-survey/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18895"
BASE_PATH = "/"
